<svg xmlns="http://www.w3.org/2000/svg" width="880" height="180" viewBox="0 0 880 180">
  <defs>
    <style><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap');
    ]]></style>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#ffffff" fill-opacity="0.04"/>
    </pattern>
    <radialGradient id="g1" cx="22%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#208868" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#0a1018" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="78%" cy="55%" r="55%">
      <stop offset="0%" stop-color="#4DD9A2" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0a1018" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#208868"/>
      <stop offset="48%"  stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#4DD9A2"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Base + dot grid -->
  <rect width="880" height="180" fill="#0a1018" rx="14"/>
  <rect width="880" height="180" fill="url(#dots)" rx="14"/>

  <!-- Colour glows -->
  <rect width="880" height="180" fill="url(#g1)" rx="14"/>
  <rect width="880" height="180" fill="url(#g2)" rx="14"/>

  <!-- Outer border -->
  <rect width="878" height="178" x="1" y="1" fill="none"
        stroke="#208868" stroke-width="1" stroke-opacity="0.55" rx="14"/>

  <!-- Top accent lines + corner dots -->
  <line x1="44" y1="38" x2="290" y2="38" stroke="#208868"     stroke-width="0.7" stroke-opacity="0.6"/>
  <line x1="590" y1="38" x2="836" y2="38" stroke="#4DD9A2" stroke-width="0.7" stroke-opacity="0.6"/>
  <circle cx="37"  cy="38"  r="3.5" fill="#208868"     opacity="0.9"/>
  <circle cx="843" cy="38"  r="3.5" fill="#4DD9A2" opacity="0.9"/>

  <!-- Bottom accent lines + corner dots -->
  <line x1="44" y1="142" x2="290" y2="142" stroke="#4DD9A2" stroke-width="0.7" stroke-opacity="0.6"/>
  <line x1="590" y1="142" x2="836" y2="142" stroke="#208868"     stroke-width="0.7" stroke-opacity="0.6"/>
  <circle cx="37"  cy="142" r="3.5" fill="#4DD9A2" opacity="0.9"/>
  <circle cx="843" cy="142" r="3.5" fill="#208868"     opacity="0.9"/>

  <!-- Main title -->
  <text x="440" y="101"
        font-family="Outfit, sans-serif" font-weight="900" font-size="52"
        fill="url(#titleGrad)" text-anchor="middle"
        letter-spacing="10" filter="url(#glow)">MALIBU TECH TEAM</text>

  <!-- Subtitle -->
  <text x="440" y="130"
        font-family="Outfit, sans-serif" font-weight="400" font-size="13"
        fill="#4DD9A2" text-anchor="middle" letter-spacing="5" opacity="0.85">
    PREMIUM FIVEM RESOURCES  •  SCRIPTS &amp; MAPS
  </text>
</svg>