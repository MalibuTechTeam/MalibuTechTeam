    ]]></style>
    <radialGradient id="ag" cx="0%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#1c1c1c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="430" height="226" fill="#1c1c1c" rx="14"/>
